name: release-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Aegis
        uses: actions/checkout@v4

      - name: Checkout AWM dependency
        uses: actions/checkout@v4
        with:
          repository: heybeaux/awm
          path: _deps/awm

      # @heybeaux/aegis-bench depends on @heybeaux/awm-core through a local
      # file: path. Under GitHub Actions the repo root is $GITHUB_WORKSPACE;
      # the lockfile resolves that package at ../../awm/packages/core. The
      # checkout action cannot write outside $GITHUB_WORKSPACE, so we checkout
      # AWM inside _deps/ and create the expected sibling symlink explicitly.
      - name: Link AWM at lockfile path
        run: |
          mkdir -p "$(dirname "$GITHUB_WORKSPACE/../../awm")"
          ln -sfn "$GITHUB_WORKSPACE/_deps/awm" "$GITHUB_WORKSPACE/../../awm"
          test -f "$GITHUB_WORKSPACE/../../awm/packages/core/package.json"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build AWM core dependency
        working-directory: _deps/awm
        run: |
          pnpm install --no-frozen-lockfile
          pnpm --filter @heybeaux/awm-core build

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release check
        env:
          AEGIS_REDOS_BUDGET_MS: '25'
        run: pnpm run release:check
